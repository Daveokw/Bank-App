name: Keep Streamlit App Awake

on:
  schedule:
    # Runs every 2 days at midnight (UTC)
    - cron: '0 0 */2 * *'
  workflow_dispatch: # Allows you to run this manually from the Actions tab

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v3
        
      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '18'
          
      - name: Install Puppeteer
        run: npm install puppeteer
        
      - name: Run keep_alive.js to Wake App
        # IMPORTANT: Replace the URL below with your actual Streamlit Cloud URL once you deploy it
        env:
          APP_URL: 'https://your-streamlit-app-url.streamlit.app'
        run: node .github/workflows/keep_alive.js
